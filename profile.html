<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>প্রোফাইল — রিলহাব</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://i.ibb.co">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="reel"></span>রিলহাব</div>
  <div class="topbar-actions">
    <button class="theme-toggle" onclick="toggleTheme()" title="থিম পরিবর্তন করুন">
      <svg class="i-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="i-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
    </button>
  </div>
</header>

<!-- লগইন না থাকলে -->
<div id="loggedOutView" class="hero-gate" style="display:none">
  <div class="glyph" style="font-size:40px">👤</div>
  <h2 style="color:var(--accent)">প্রোফাইল দেখতে লগইন করুন</h2>
  <p style="color:var(--text-dim);font-size:14px;max-width:280px">আপনার আপলোড করা ফটো ও অ্যাকাউন্ট তথ্য দেখতে লগইন করুন</p>
  <button class="btn" style="width:auto;padding:12px 26px" onclick="openAuthModal('login')">লগইন করুন</button>
</div>

<!-- লগইন থাকলে -->
<div id="loggedInView" style="display:none">
  <div class="profile-header">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar js-avatar js-initial">?</div>
      <button class="avatar-edit-btn" onclick="document.getElementById('avatarInput').click()" title="প্রোফাইল ছবি পরিবর্তন করুন">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>
      </button>
      <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="onAvatarSelected(this)">
    </div>
    <div class="profile-name js-username">ইউজার</div>
    <div class="profile-username" id="profileUsername"></div>
    <div class="profile-email" id="profileEmail"></div>
    <div class="profile-stats">
      <div class="stat"><b id="statPhotos">0</b><span>পোস্ট</span></div>
      <div class="stat"><b id="statLikes">0</b><span>মোট লাইক</span></div>
      <div class="stat"><b id="statJoined">—</b><span>যোগদান</span></div>
    </div>
    <div class="profile-actions">
      <button class="btn secondary" style="width:auto;padding:9px 22px" onclick="handleLogout()">লগআউট</button>
    </div>
  </div>

  <div class="theme-switch-row">
    <div class="lbl">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      থিম
    </div>
    <div class="seg-switch">
      <button data-theme-btn="dark" onclick="setTheme('dark')">🌙 ডার্ক</button>
      <button data-theme-btn="light" onclick="setTheme('light')">☀️ হোয়াইট</button>
    </div>
  </div>

  <div class="section-title">আমার আপলোড</div>
  <div id="myUploads" class="feed"></div>
</div>

<!-- বটম নেভিগেশন -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" data-page="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    হোম
  </a>
  <button class="nav-upload" onclick="openUploadModal()" title="আপলোড">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <a href="profile.html" class="nav-item active" data-page="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    প্রোফাইল
  </a>
</nav>

<!-- ============ আপলোড মোডাল ============ -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <button class="modal-close" onclick="closeUploadModal()">✕</button>
    <h2 style="margin-top:22px">ফটো আপলোড করুন</h2>
    <p class="sub">গ্যালারি থেকে ফটো বেছে নিয়ে শিরোনাম লিখুন</p>
    <form id="uploadForm" onsubmit="handlePhotoUpload(event)">
      <label class="upload-drop" id="uploadDrop" for="fileInput">
        <div>📷 ফটো সিলেক্ট করতে এখানে ক্লিক করুন</div>
        <div id="uploadPreviewWrap"></div>
      </label>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFileSelected(this)">
      <div class="field">
        <label>ক্যাপশন / শিরোনাম</label>
        <input type="text" id="uploadCaption" required placeholder="ফটোর একটি সুন্দর শিরোনাম লিখুন">
      </div>
      <div class="field">
        <label>ক্যাটাগরি</label>
        <select id="uploadCategory">
          <option value="other">বাংলা ভিডিও</option>
          <option value="natural">ভাইরাল ভিডিও</option>
          <option value="travel">গার্লফ্রেন্ড নুড</option>
          <option value="entertainment">গোসল ভিডিও</option>
          <option value="education">আম্মু ভিডিও</option>
          <option value="funny">Spy Video</option>
        </select>
      </div>
      <div class="progress-bar" id="uploadProgress"><div class="progress-fill"></div></div>
      <button class="btn" id="uploadSubmitBtn" type="submit" style="margin-top:6px">আপলোড করুন</button>
    </form>
  </div>
</div>

<!-- ============ অথ মোডাল ============ -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <div class="auth-banner">
      <div class="auth-banner-logo">🎬</div>
      <h2 id="authTitle">লগইন করুন</h2>
      <p class="sub" id="authSub" style="margin-top:4px"></p>
    </div>
    <div class="auth-toggle">
      <button type="button" data-mode="login" class="active" onclick="switchAuthMode('login')">লগইন</button>
      <button type="button" data-mode="register" onclick="switchAuthMode('register')">রেজিস্ট্রেশন</button>
    </div>
    <div class="form-error" id="authError"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field"><label>ইউজারনেম অথবা ইমেইল</label><input type="text" id="loginIdentifier" required placeholder="username অথবা you@example.com"></div>
      <div class="field"><label>পাসওয়ার্ড</label><input type="password" id="loginPassword" required placeholder="••••••••"></div>
      <button class="btn" id="loginBtn" type="submit">লগইন করুন</button>
      <p class="auth-switch">অ্যাকাউন্ট নেই? <button type="button" class="link-btn" onclick="switchAuthMode('register')">রেজিস্ট্রেশন করুন</button></p>
    </form>
    <form id="registerForm" onsubmit="handleRegister(event)" style="display:none">
      <div class="field"><label>পুরো নাম</label><input type="text" id="regName" required placeholder="আপনার নাম"></div>
      <div class="field"><label>ইউজারনেম</label><input type="text" id="regUsername" required placeholder="যেমন: rafiq_24"></div>
      <div class="field-row">
        <div class="field"><label>ফোন নম্বর (ঐচ্ছিক)</label><input type="tel" id="regPhone" placeholder="01XXXXXXXXX"></div>
        <div class="field"><label>জিমেইল</label><input type="email" id="regEmail" required placeholder="you@gmail.com"></div>
      </div>
      <div class="field"><label>পাসওয়ার্ড</label><input type="password" id="regPassword" required minlength="6" placeholder="কমপক্ষে ৬ ক্যারেক্টার"></div>
      <button class="btn" id="registerBtn" type="submit">অ্যাকাউন্ট খুলুন</button>
      <p class="auth-switch">অ্যাকাউন্ট আছে? <button type="button" class="link-btn" onclick="switchAuthMode('login')">লগইন করুন</button></p>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" defer></script>
<script src="js/firebase-config.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/app.js" defer></script>
<script>
document.addEventListener('authReady', (e) => {
  const user = e.detail.user;
  document.getElementById('loggedOutView').style.display = user ? 'none' : 'flex';
  document.getElementById('loggedInView').style.display = user ? 'block' : 'none';
  if (user) {
    document.getElementById('profileEmail').textContent = user.email;
    document.getElementById('profileUsername').textContent = currentUserData?.username ? '@' + currentUserData.username : '';
    const joined = currentUserData?.createdAt?.toDate ? currentUserData.createdAt.toDate() : null;
    document.getElementById('statJoined').textContent = joined
      ? joined.toLocaleDateString('bn-BD', { year:'numeric', month:'short' })
      : '—';
    loadMyUploads(user.uid);
  }
});

function onAvatarSelected(input) {
  const file = input.files[0];
  if (!file) return;
  uploadAvatar(file);
}

async function loadMyUploads(uid) {
  const el = document.getElementById('myUploads');
  el.innerHTML = skeletonCards(3);
  try {
    const snap = await db.collection('media').where('uploaderUid','==',uid).orderBy('createdAt','desc').get();
    const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('statPhotos').textContent = items.length;
    document.getElementById('statLikes').textContent = formatCount(items.reduce((s,i)=>s+(i.likeCount||0),0));
    el.innerHTML = items.length
      ? items.map(mediaCardHTML).join('')
      : `<div class="empty-state"><div class="glyph">📷</div>আপনি এখনো কিছু আপলোড করেননি</div>`;
    initLazyVideos(el);
  } catch (e) { console.error(e); }
}
</script>
</body>
</html>
