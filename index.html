<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Video Hub — ভিডিও ও ফটো শেয়ারিং</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://i.ibb.co">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>

<!-- টপবার -->
<header class="topbar">
  <div class="brand"><span class="reel"></span>Video Hub</div>
  <div class="topbar-actions">
    <button class="theme-toggle" onclick="toggleTheme()" title="থিম পরিবর্তন করুন">
      <svg class="i-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="i-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
    </button>
    <button class="icon-btn" onclick="loadFeed()" title="রিফ্রেশ">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/></svg>
    </button>
    <a href="profile.html" class="icon-btn js-avatar js-initial" data-auth="loggedin" title="প্রোফাইল">?</a>
    <button class="icon-btn" data-auth="loggedout" onclick="openAuthModal('login')" title="লগইন">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </div>
</header>

<div class="sprockets"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

<!-- ধরন ট্যাব (সব / ভিডিও / ফটো) -->
<div class="tabs">
  <button class="tab active" onclick="setFeedFilter('all', this)">সব</button>
  <button class="tab" onclick="setFeedFilter('video', this)">🎬 ভিডিও</button>
  <button class="tab" onclick="setFeedFilter('photo', this)">🖼️ ফটো</button>
</div>

<!-- ক্যাটাগরি চিপ (একদম উপরে, ধরন ট্যাবের নিচে) -->
<div class="tabs chip-row" id="categoryChips"></div>

<!-- টপ ভিউ ভিডিও ব্যানার -->
<div class="trending-wrap" id="trendingWrap"></div>

<!-- ফিড (গ্রিড) -->
<main id="feed" class="feed"></main>

<!-- বটম নেভিগেশন -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active" data-page="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    হোম
  </a>
  <button class="nav-upload" onclick="openUploadModal()" title="আপলোড">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <a href="profile.html" class="nav-item" data-page="profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    প্রোফাইল
  </a>
</nav>

<!-- ============ অথ মোডাল ============ -->
<div class="modal-overlay" id="authModal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <div class="auth-banner">
      <div class="auth-banner-logo">🎬</div>
      <h2 id="authTitle">লগইন করুন</h2>
      <p class="sub" id="authSub" style="margin-top:4px">ভিডিও-ফটো দেখতে ও আপলোড করতে লগইন করুন</p>
    </div>
    <div class="auth-toggle">
      <button type="button" data-mode="login" class="active" onclick="switchAuthMode('login')">লগইন</button>
      <button type="button" data-mode="register" onclick="switchAuthMode('register')">রেজিস্ট্রেশন</button>
    </div>
    <div class="form-error" id="authError"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field field-icon-wrap">
        <label>ইউজারনেম অথবা ইমেইল</label>
        <input type="text" id="loginIdentifier" required placeholder="username অথবা you@example.com">
        <span class="fi">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        </span>
      </div>
      <div class="field field-icon-wrap">
        <label>পাসওয়ার্ড</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
        <span class="fi">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
      </div>
      <button class="btn" id="loginBtn" type="submit">লগইন করুন</button>
      <p class="auth-switch">অ্যাকাউন্ট নেই? <button type="button" class="link-btn" onclick="switchAuthMode('register')">রেজিস্ট্রেশন করুন</button></p>
    </form>

    <form id="registerForm" onsubmit="handleRegister(event)" style="display:none">
      <div class="field field-icon-wrap">
        <label>পুরো নাম</label>
        <input type="text" id="regName" required placeholder="আপনার নাম">
        <span class="fi">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        </span>
      </div>
      <div class="field field-icon-wrap">
        <label>ইউজারনেম</label>
        <input type="text" id="regUsername" required placeholder="যেমন: rafiq_24" pattern="[a-zA-Z0-9_.]{3,}">
        <span class="fi">@</span>
      </div>
      <div class="field-row">
        <div class="field field-icon-wrap">
          <label>ফোন নম্বর (ঐচ্ছিক)</label>
          <input type="tel" id="regPhone" placeholder="01XXXXXXXXX">
          <span class="fi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.9.6 2.7a2 2 0 01-.5 2.1L8 9.7a16 16 0 006 6l1.2-1.2a2 2 0 012.1-.5c.9.3 1.8.5 2.7.6a2 2 0 011.7 2z"/></svg>
          </span>
        </div>
        <div class="field field-icon-wrap">
          <label>জিমেইল / ইমেইল</label>
          <input type="email" id="regEmail" required placeholder="you@gmail.com">
          <span class="fi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6l-10 7L2 6"/></svg>
          </span>
        </div>
      </div>
      <div class="field field-icon-wrap">
        <label>পাসওয়ার্ড</label>
        <input type="password" id="regPassword" required minlength="6" placeholder="কমপক্ষে ৬ ক্যারেক্টার">
        <span class="fi">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
      </div>
      <button class="btn" id="registerBtn" type="submit">অ্যাকাউন্ট খুলুন</button>
      <p class="auth-switch">অ্যাকাউন্ট আছে? <button type="button" class="link-btn" onclick="switchAuthMode('login')">লগইন করুন</button></p>
    </form>
  </div>
</div>

<!-- ============ আপলোড মোডাল ============ -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <button class="modal-close" onclick="closeUploadModal()">✕</button>
    <h2 style="margin-top:22px">ফটো আপলোড করুন</h2>
    <p class="sub">গ্যালারি থেকে ফটো বেছে নিয়ে শিরোনাম লিখুন</p>

    <form id="uploadForm" onsubmit="handlePhotoUpload(event)">
      <label class="upload-drop" id="uploadDrop" for="fileInput">
        <div>📷 ফটো সিলেক্ট করতে এখানে ক্লিক করুন</div>
        <div id="uploadPreviewWrap"></div>
      </label>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFileSelected(this)">

      <div class="field">
        <label>ক্যাপশন / শিরোনাম</label>
        <input type="text" id="uploadCaption" required placeholder="ফটোর একটি সুন্দর শিরোনাম লিখুন">
      </div>
      <div class="field">
        <label>ক্যাটাগরি</label>
        <select id="uploadCategory">
          <option value="other">বাংলা ভিডিও</option>
          <option value="natural">ভাইরাল ভিডিও</option>
          <option value="travel">গার্লফ্রেন্ড নুড</option>
          <option value="entertainment">গোসল ভিডিও</option>
          <option value="education">আম্মুর ভিডিও</option>
          <option value="funny">Spy Video</option>
        </select>
      </div>

      <div class="progress-bar" id="uploadProgress"><div class="progress-fill"></div></div>
      <button class="btn" id="uploadSubmitBtn" type="submit" style="margin-top:6px">আপলোড করুন</button>
    </form>

    <p class="sub" style="margin-top:14px;font-size:12px">
      🎬 ভিডিও আপলোড আপাতত বন্ধ আছে — শুধুমাত্র অ্যাডমিন প্যানেল থেকে ভিডিও যোগ করা যায়।
    </p>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" defer></script>
<script src="js/firebase-config.js" defer></script>
<script src="js/auth.js" defer></script>
<script src="js/app.js" defer></script>
<script>
  function renderCategoryChips() {
    const wrap = document.getElementById('categoryChips');
    wrap.innerHTML = CATEGORY_LIST.map((c, idx) => `
      <button class="tab chip ${idx===0?'active':''}" onclick="setCategoryFilter('${c.id}', this)">${c.label}</button>
    `).join('');
  }
  /* defer করা স্ক্রিপ্টগুলো DOM parse শেষে, DOMContentLoaded-এর ঠিক আগে একে একে রান হয় —
     তাই renderCategoryChips/loadFeed কল এখন DOMContentLoaded-এর ভেতরে রাখা হলো,
     যাতে app.js লোড হওয়ার আগেই এগুলো কল না হয়ে যায়। */
  document.addEventListener('DOMContentLoaded', () => {
    renderCategoryChips();
    loadFeed();
  });
</script>
</body>
</html>
